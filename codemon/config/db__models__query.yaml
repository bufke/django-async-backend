pathname: db/models/query.py

module:
  new_imports:
    - "from django_async_backend.db import async_connections"
    - "from django_async_backend.db.models import sql as async_sql"
    - "from django_async_backend.db.transaction import async_atomic"
    - "from django_async_backend.db.transaction import async_mark_for_rollback_on_error"

  functions:
    prefetch_related_objects:
      to_async: true

    # todo:
    # aprefetch_related_objects:
    #   remove: true

  classes:
    QuerySet:
      assigns:
        - target:
            name: create
          remove: true

        - target:
            name: bulk_update
          remove: true

        - target:
            name: get_or_create
          remove: true

        - target:
            name: update
          rename: aupdate

        - target:
            name: update_or_create
          remove: true

        - target:
            name: bulk_create
          rename: abulk_create

        - target:
            name: delete
          remove: true

        - target:
            name: acreate
          remove: true

        - target:
            name: abulk_create
          remove: true

        - target:
            name: abulk_update
          remove: true

        - target:
            name: aget_or_create
          remove: true

        - target:
            name: aupdate_or_create
          remove: true

        - target:
            name: adelete
          remove: true

        - target:
            name: aupdate
          remove: true

      methods:
        __init__:
          calls:
            - func:
                attr: Query
              rename:
                func:
                  value: async_sql

        __getitem__:
          add_raw_top:
            - |
              async def fetch_data(query_set, index):
                  if query_set._result_cache is None:
                      await query_set._fetch_all()
                  return query_set._result_cache[index]
            - |
              async def fetch_data_iter(query_set, index):
                  if query_set._result_cache is None:
                      await query_set._fetch_all()
                  for item in query_set._result_cache[index]:
                      yield item
            - |
              def get_data():
                  if self._result_cache is not None:
                      return (
                          fetch_data_iter(self, k) if isinstance(k, slice) else fetch_data(self, k)
                      )

                  if isinstance(k, slice):
                      return (
                          fetch_data_iter(qs, slice(None, None, k.step)) if k.step else qs
                      )

                  return fetch_data(qs, 0)
          calls:
            - func:
                attr: _fetch_all
              replace_raw: "..."
          return_blocks:
            - replace_raw: 'get_data()'

        _prefetch_related_objects:
          to_async: true
          calls:
            - name: prefetch_related_objects
              to_await: true

        aexplain:
          remove: True

        _iterator:
          remove: True

        aiterator:
          remove: True

        aget:
          remove: true

        acreate:
          remove: true

        abulk_create:
          remove: true

        abulk_update:
          remove: true

        aget_or_create:
          remove: true

        aupdate_or_create:
          remove: true

        aaggregate:
          remove: true

        acount:
          remove: true

        aexists:
          remove: true

        acontains:
          remove: true

        afirst:
          remove: true

        alast:
          remove: true

        aearliest:
          remove: true

        alatest:
          remove: true

        araw:
          remove: true

        raw:
          remove: true

        prefetch_related:
          remove: true

        select_for_update:
          remove: true

        ain_bulk:
          remove: true

        adelete:
          remove: true

        aupdate:
          remove: true

        __iter__:
          remove: true

        __len__:
          remove: true

        __bool__:
          remove: true

        __repr__:
          remove: true

        __getstate__:
          remove: true

        __setstate__:
          remove: true

        __xor__:
          remove: true

        __or__:
          remove: true

        __and__:
          remove: true

        only:
          remove: true

        defer:
          remove: true

        alias:
          remove: true

        datetimes:
          remove: true

        dates:
          remove: true

        explain:
          to_async: true
          rename: aexplain

          calls:
            - func:
                attr: explain
              to_await: true

        get:
          to_async: true
          rename: aget
          calls:
            - name: len
              replace_raw: 'len([i async for i in clone])'

        create:
          # to_async: true
          # rename: acreate
          remove: true

        bulk_create:
          to_async: true
          rename: abulk_create
          # _handle_order_with_respect_to() runs a sync ORM query; reject until async.
          add_raw_top:
            - |
                if self.model._meta.order_with_respect_to:
                    raise NotImplementedError(
                        "Async bulk_create does not yet support models "
                        "defined with order_with_respect_to."
                    )
          context_managers:
            - to_async: true
          calls:
            - func:
                value: transaction
                attr: atomic
              replace_raw: 'async_atomic(using=self.db, savepoint=False)'
            - func:
                attr: _batched_insert
              to_await: true

        bulk_update:
          # to_async: true
          # rename: abulk_update
          remove: true

        get_or_create:
          # to_async: true
          # rename: aget_or_create
          remove: true

        update_or_create:
          # to_async: true
          # rename: aupdate_or_create
          remove: true

        aggregate:
          to_async: true
          rename: aaggregate

          calls:
            - func:
                attr: chain
              to_await: true

        count:
          to_async: true
          rename: acount
          calls:
            - func:
                attr: get_count
              to_await: true

        exists:
          to_async: true
          rename: aexists
          calls:
            - func:
                attr: has_results
              to_await: true

        contains:
          # to_async: true
          # rename: acontains
          remove: true

        first:
          to_async: true
          rename: afirst
          for_statements:
            - target: obj
              to_async: true

        last:
          to_async: true
          rename: alast
          for_statements:
            - target: obj
              to_async: true

        _earliest:
          calls:
            - func:
                attr: get
              rename:
                func:
                  attr: aget

        earliest:
          rename: aearliest

        latest:
          rename: alatest

        in_bulk:
          to_async: true
          rename: ain_bulk
          comp_for_blocks:
            - target:
                name: obj
              to_async: true

          calls:
            - name: tuple
              args:
                - func:
                    attr: filter
              replace_raw: 'tuple([i async for i in self.filter(**{filter_key: batch})])'

        delete:
          # to_async: true
          # rename: adelete
          remove: true

        update:
          to_async: true
          rename: aupdate
          context_managers:
            - to_async: true
          calls:
            - func:
                attr: chain
              replace_raw: 'self.query.chain(async_sql.UpdateQuery)'
            - func:
                value: transaction
                attr: mark_for_rollback_on_error
              replace_raw: 'async_mark_for_rollback_on_error(using=self.db)'
            - func:
                attr: execute_sql
              to_await: true

        iterator:
          # to_async: true
          # rename: aiterator
          remove: true

        _raw_delete:
          to_async: true
          calls:
            - func:
                attr: execute_sql
              to_await: true

        _update:
          to_async: true
          calls:
            - func:
                attr: chain
              replace_raw: 'self.query.chain(async_sql.UpdateQuery)'
            - func:
                attr: execute_sql
              to_await: true
            - func:
                attr: execute_returning_sql
              to_await: true

        _insert:
          to_async: true
          calls:
            - func:
                attr: InsertQuery
              rename:
                func:
                  value: async_sql
            - func:
                attr: execute_sql
              to_await: true

        _batched_insert:
          to_async: true
          context_managers:
            - to_async: true
          calls:
            - func:
                value: transaction
                attr: atomic
              replace_raw: 'async_atomic(using=self.db, savepoint=False)'
            - func:
                attr: _insert
              to_await: true

        __aiter__:
          calls:
            - name: sync_to_async
              replace_raw: self._fetch_all

        _fetch_all:
          to_async: true
          calls:
            - name: list
              replace_raw: list([i async for i in self._iterable_class(self)])
            - func:
                value: self
                attr: _prefetch_related_objects
              to_await: true

    BaseIterable:
      methods:
        _async_generator:
          remove: true

        __aiter__:
          remove: true

    ModelIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true
          calls:
            - func:
                attr: results_iter
              to_await: true
            - func:
                attr: execute_sql
              to_await: true

    RawModelIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true

    ValuesIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true
          calls:
            - func:
                attr: results_iter
              to_await: true

    ValuesListIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true
          return_blocks:
            - remove: true
          add_raw_bottom:
            - |
                for i in await compiler.results_iter(
                    tuple_expected=True,
                    chunked_fetch=self.chunked_fetch,
                    chunk_size=self.chunk_size,
                ):
                    yield i

    NamedValuesListIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true
          for_statements:
            - target: row
              to_async: true
          calls:
            - func:
                attr: __iter__
              rename:
                func:
                  attr: __aiter__

    FlatValuesListIterable:
      methods:
        __iter__:
          rename: __aiter__
          to_async: true
          calls:
            - func:
                attr: results_iter
              to_await: true
